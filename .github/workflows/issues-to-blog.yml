name: Issues to Blog

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch issues
        run: |
          curl -sH "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=100" > issues.json

      - name: Convert to posts
        run: |
          python3 << 'PY'
import json, re, os
from datetime import datetime

with open('issues.json') as f:
    issues = json.load(f)

issues.sort(key=lambda x: x['created_at'], reverse=True)

posts_html = ""
for issue in issues[:20]:
    title = issue['title']
    date = issue['created_at'][:10]
    labels = [l['name'] for l in issue.get('labels', [])]
    fname = re.sub(r'[^\w\s-]', '', title)[:50].replace(' ', '-')
    
    posts_html += f'''<div class="post">
        <h3><a href="_posts/{date}-{fname}.html">{title}</a></h3>
        <p class="post-date">{date}</p>
    </div>
'''

os.makedirs('_posts', exist_ok=True)

with open('index.html') as f:
    html = f.read()

html = re.sub(r'<span id="count">\d+</span>', f'<span id="count">{len(issues)}</span>', html)
html = re.sub(r'<main id="posts">.*?</main>', f'<main id="posts">{posts_html}</main>', html, flags=re.DOTALL)

with open('index.html', 'w') as f:
    f.write(html)

for issue in issues:
    title, body, date = issue['title'], issue['body'] or '', issue['created_at'][:10]
    labels = [l['name'] for l in issue.get('labels', [])]
    fname = re.sub(r'[^\w\s-]', '', title)[:50].replace(' ', '-')
    filename = f'_posts/{date}-{fname}.html'
    
    body = re.sub(r'^# (.+)$', r'<h1>\1</h1>', body, flags=re.MULTILINE)
    body = re.sub(r'^## (.+)$', r'<h2>\1</h2>', body, flags=re.MULTILINE)
    body = re.sub(r'^### (.+)$', r'<h3>\1</h3>', body, flags=re.MULTILINE)
    body = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', body)
    body = re.sub(r'`([^`]+)`', r'<code>\1</code>', body)
    body = re.sub(r'```(\w+)?\n([\s\S]*?)```', r'<pre><code>\2</code></pre>', body)
    body = re.sub(r'^- (.+)$', r'<li>\1</li>', body, flags=re.MULTILINE)
    body = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', r'<a href="\2">\1</a>', body)
    body = re.sub(r'!\[([^\]]*)\]\(([^)]+)\)', r'<img src="\2" alt="\1">', body)
    
    content = f'''<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>{title}</title>
<style>
body{{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:800px;margin:0auto;padding:20px;line-height:1.6}}
code{{background:#f6f8fa;padding:2px 6px;border-radius:3px}}
pre{{background:#f6f8fa;padding:15px;border-radius:6px;overflow-x:auto}}
a{{color:#0366d6}}
img{{max-width:100%}}
</style></head>
<body>
<p><a href="../index.html">← Back</a></p>
<h1>{title}</h1>
<p>{date}</p>
<hr>
{body}
<hr>
<p><small>From GitHub Issue</small></p>
</body></html>'''
    
    with open(filename, 'w') as f:
        f.write(content)

print(f'Created {len(issues)} posts')
          PY

      - name: Commit
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "Update blog from issues"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
